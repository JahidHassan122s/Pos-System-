<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery POS - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="sidebar">
    <h2>Shop Name</h2>
    <ul>
      <li>Dashboard</li>
      <li>POS Billing</li>
      <li>Products</li>
      <li>Customers</li>
      <li>Suppliers</li>
      <li>Purchase</li>
      <li>Reports</li>
      <li>Settings</li>
      <li>Backup</li>
    </ul>
  </div>

  <div class="main-content">
    <header>
      <input type="text" placeholder="Search...">
      <div class="user-profile">Admin</div>
    </header>

    <section class="stats">
      <div class="card">Today Sales: 0 BDT</div>
      <div class="card">Total Products: 0</div>
      <div class="card">Low Stock: 0</div>
      <div class="card">Total Profit: 0 BDT</div>
    </section>

    <section class="charts">
      <!-- Sales & Stock charts placeholders -->
      <div class="chart">Sales Chart</div>
      <div class="chart">Stock Chart</div>
    </section>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
